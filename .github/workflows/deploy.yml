name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew build -x test
      
      - name: Run tests
        run: ./gradlew test
      
      - name: Copy jar to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > ec2_key.pem
          chmod 600 ec2_key.pem
          scp -i ec2_key.pem -o StrictHostKeyChecking=no \
            build/libs/brahmavanam-0.0.17-SNAPSHOT.jar \
            $EC2_USER@$EC2_HOST:/home/ec2-user/brahmavanam/jar/
          rm -f ec2_key.pem
      
      - name: Restart application on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > ec2_key.pem
          chmod 600 ec2_key.pem
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
            # Restart the systemd service
            sudo systemctl restart brahmavanam.service
            
            # Wait for service to start
            sleep 5
            
            # Verify service is running
            if ! sudo systemctl is-active --quiet brahmavanam.service; then
              echo "ERROR: Service failed to start"
              sudo systemctl status brahmavanam.service
              exit 1
            fi
            
            echo "Deployment successful!"
            sudo systemctl status brahmavanam.service
          EOF
          rm -f ec2_key.pem
