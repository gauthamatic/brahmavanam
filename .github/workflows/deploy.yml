name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      APP_VERSION: 0.0.${{ github.run_number }}
      JAR_NAME: brahmavanam-0.0.${{ github.run_number }}.jar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew build -x test -PappVersion=${{ env.APP_VERSION }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brahmavanam-${{ env.APP_VERSION }}
          path: build/libs/${{ env.JAR_NAME }}
          retention-days: 90

      - name: Copy jar to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > ec2_key.pem
          chmod 600 ec2_key.pem
          scp -i ec2_key.pem -o StrictHostKeyChecking=no \
            build/libs/${{ env.JAR_NAME }} \
            $EC2_USER@$EC2_HOST:/home/ec2-user/brahmavanam/jar/
          # Update symlink to point to latest jar
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST \
            "ln -sf /home/ec2-user/brahmavanam/jar/${{ env.JAR_NAME }} /home/ec2-user/brahmavanam/jar/brahmavanam.jar"
          rm -f ec2_key.pem
      
      - name: Restart application on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > ec2_key.pem
          chmod 600 ec2_key.pem
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
            sudo systemctl restart brahmavanam.service
            sleep 5
            if ! sudo systemctl is-active --quiet brahmavanam.service; then
              echo "ERROR: Service failed to start"
              sudo systemctl status brahmavanam.service
              exit 1
            fi
            echo "Deployment successful!"
            # Keep only the 2 most recent jars, delete the rest
            ls -t /home/ec2-user/brahmavanam/jar/brahmavanam-*.jar | tail -n +3 | xargs -r rm -f
          EOF
          rm -f ec2_key.pem
